<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>CheckStock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; background:#f5f5f5; padding:16px; margin:0; }
    input { width:100%; padding:14px; font-size:18px; margin-bottom:12px; }
    .card { background:#fff; padding:14px; border-radius:8px; margin-bottom:10px; }
    .location { font-size:20px; font-weight:bold; color:#1a73e8; }
  </style>
</head>
<body>

<h2>ค้นหางาน</h2>

<input id="search" placeholder="พิมพ์รหัสลูกค้า หรือ ชื่องาน หรือ โซนเช่น A2-10">

<div id="stats" class="card">สรุป: -</div>
<div id="zoneInfo"></div>
<div id="result"></div>



<script>
  
function renderStats(all, filtered) {
  const totalJobs = all.length;

  const totalCustomers = new Set(
    all.map(d => d.code).filter(Boolean)
  ).size;

  const totalLocations = new Set(
    all.map(d => d.location).filter(Boolean)
  ).size;

  const filteredJobs = filtered.length;

  statsEl.innerHTML =
    "ทั้งหมด: " + totalJobs + " งาน • " +
    totalCustomers + " ลูกค้า • " +
    totalLocations + " โลเคชั่น" +
    "<br>ผลค้นหา: " + filteredJobs + " งาน";
}

console.log("CHECKSTOCK V2 CLEAN START");

const SHEET_ID = "17dwMvTFAu48MdQ8FwKRDJGAQuAEwpQNmoggzD8OqGJA";
const CSV_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv";

let data = [];
  const statsEl = document.getElementById("stats");

fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    const rows = text.split("\n").slice(1);
    data = rows.map(r => {
      const c = r.split(",");
      return { code:c[0]||"", job:c[1]||"", location:c[2]||"" };
      enderStats(data, data);
      renderStats(data, data);
    });
  });

document.getElementById("search").addEventListener("input", search);

function render(list){
  result.innerHTML = "";
  list.forEach(d => {
    result.innerHTML += `
      <div class="card">
        <div><b>${d.job}</b></div>
        <div class="location">${d.location}</div>
        <div>รหัสลูกค้า: ${d.code}</div>
      </div>`;
  });
}
  
function search() {
  const q = document.getElementById("search").value.toLowerCase();

  // กรองข้อมูลตามคำค้น
  const result = data.filter(d =>
    (d.code || "").toLowerCase().includes(q) ||
    (d.job || "").toLowerCase().includes(q) ||
    (d.location || "").toLowerCase().includes(q)
  );

  // ✅ อัปเดตสรุป
  renderStats(data, result);

  // ✅ แสดงผลลัพธ์
  render(result);
}
``

</script>

</body>
</html>
