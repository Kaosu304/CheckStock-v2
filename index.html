<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>CheckStock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; background:#f5f5f5; padding:16px; margin:0; }
    input { width:100%; padding:14px; font-size:18px; margin-bottom:12px; }
    .card { background:#fff; padding:14px; border-radius:8px; margin-bottom:10px; }
    .location { font-size:20px; font-weight:bold; color:#1a73e8; }
  </style>
</head>
<body>

<h2>ค้นหางาน</h2>

<input id="search" placeholder="พิมพ์รหัสลูกค้า หรือ ชื่องาน">

<div id="stats" class="card">สรุป: -</div>
<div id="result"></div>

<script>
console.log("CHECKSTOCK V2 STEP1 OK");

const SHEET_ID = "17dwMvTFAu48MdQ8FwKRDJGAQuAEwpQNmoggzD8OqGJA";
const CSV_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv";

const searchEl = document.getElementById("search");
const resultEl = document.getElementById("result");
const statsEl  = document.getElementById("stats");

let data = [];

/* ===== LOAD DATA ===== */
fetch(CSV_URL)
  .then(r => r.text())
  .then(text => {
    const rows = text.split("\n").slice(1);
    data = rows.map(r => {
      const c = r.split(",");
      return {
        code: (c[0] || "").trim(),
        job: (c[1] || "").trim(),
        location: (c[2] || "").trim()
      };
    }).filter(d => d.code || d.job || d.location);

    renderStats(data, data);
    render(data);
  });

/* ===== SEARCH ===== */
searchEl.addEventListener("input", search);

function search(){
  const q = searchEl.value.toLowerCase();
  const filtered = data.filter(d =>
    d.code.toLowerCase().includes(q) ||
    d.job.toLowerCase().includes(q) ||
    d.location.toLowerCase().includes(q)
  );

  renderStats(data, filtered);
  render(filtered);
}

/* ===== RENDER LIST ===== */
function render(list){
  resultEl.innerHTML = "";

  if(!list.length){
    resultEl.innerHTML = "<div class='card'>ไม่พบข้อมูล</div>";
    return;
  }

  list.forEach(d => {
    resultEl.innerHTML += `
      <div class="card">
        <div><b>${d.job}</b></div>
        <div class="location">${d.location}</div>
        <div>รหัสลูกค้า: ${d.code}</div>
      </div>`;
  });
}

/* ===== STATS ===== */
function renderStats(all, filtered){
  const totalJobs = all.length;
  const customers = new Set(all.map(d => d.code)).size;
  const locations = new Set(all.map(d => d.location)).size;

  statsEl.innerHTML =
    "ทั้งหมด: " + totalJobs + " งาน • " +
    customers + " ลูกค้า • " +
    locations + " โลเคชั่น" +
    "<br>ผลค้นหา: " + filtered.length + " งาน";
}
</script>

</body>
</html>
